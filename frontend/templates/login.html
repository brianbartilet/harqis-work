{% extends "base.html" %}
{% block title %}HARQIS — Login{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <!-- Logo / Title -->
    <div class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-blue-600/20 ring-1 ring-blue-500/40 mb-4">
        <svg class="w-7 h-7 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold tracking-tight text-white">HARQIS</h1>
      <p class="mt-1 text-sm text-slate-400">Workflow Dashboard</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-900 ring-1 ring-slate-800 rounded-2xl p-8 shadow-2xl">

      {% if error %}
      <div class="mb-5 flex items-center gap-2.5 rounded-lg bg-red-950/60 ring-1 ring-red-500/30 px-4 py-3 text-sm text-red-300">
        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a.75.75 0 01.75.75v4.5a.75.75 0 01-1.5 0v-4.5A.75.75 0 0110 5zm0 10a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-5">
        <div>
          <label for="username" class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">
            Username
          </label>
          <input
            id="username" name="username" type="text"
            autocomplete="username" required autofocus
            class="w-full rounded-lg bg-slate-800 border border-slate-700 px-3.5 py-2.5 text-sm text-white
                   placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   transition"
            placeholder="admin">
        </div>

        <div>
          <label for="password" class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">
            Password
          </label>
          <input
            id="password" name="password" type="password"
            autocomplete="current-password" required
            class="w-full rounded-lg bg-slate-800 border border-slate-700 px-3.5 py-2.5 text-sm text-white
                   placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   transition"
            placeholder="••••••••">
        </div>

        <button
          type="submit"
          class="w-full rounded-lg bg-blue-600 hover:bg-blue-500 active:bg-blue-700
                 px-4 py-2.5 text-sm font-semibold text-white transition-colors
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-900">
          Sign in
        </button>
      </form>
    </div>

    <p class="mt-6 text-center text-xs text-slate-600">
      HARQIS Automation Platform
    </p>
  </div>
</div>
{% endblock %}
