{% extends "base.html" %}
{% block title %}HARQIS — {{ application.label }} Documentation{% endblock %}

{% block content %}
<main class="mx-auto max-w-5xl px-4 sm:px-6 lg:px-8 py-8">
  <a href="/applications/{{ application.key }}" class="text-xs text-slate-500 hover:text-white">← {{ application.label }}</a>
  <div class="mt-4 mb-5">
    <p class="text-xs uppercase tracking-[0.22em] text-blue-400">Application documentation</p>
    <h1 class="mt-2 text-xl font-semibold text-white">{{ document_path }}</h1>
  </div>
  <article class="markdown-body rounded-xl bg-slate-900/70 p-5 sm:p-8 ring-1 ring-slate-800">{{ rendered }}</article>
</main>
{% endblock %}
