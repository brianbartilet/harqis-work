<!DOCTYPE html>
<!-- Generic Pokeball cardback — original CSS art, 822x1122 px (MPC bleed spec).
     Deliberately NOT the copyrighted official card back. -->
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 822px; height: 1122px; }
  body { background: radial-gradient(circle at 50% 42%, #2c3e6b 0%, #16213e 65%, #0e1530 100%); }
  .ball {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 460px; height: 460px; border-radius: 50%;
    background: linear-gradient(#d63031 0 45%, #131313 45% 55%, #ecf0f1 55% 100%);
    border: 10px solid #131313;
    box-shadow: 0 0 120px rgba(214, 48, 49, 0.35), inset -18px -24px 60px rgba(0,0,0,0.35);
  }
  .ball::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 110px; height: 110px; transform: translate(-50%, -50%);
    background: #ecf0f1; border: 22px solid #131313; border-radius: 50%;
    box-shadow: inset 0 0 0 12px #bdc3c7;
  }
  .ring {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    border: 3px solid rgba(236, 240, 241, 0.12); border-radius: 50%;
  }
  .r1 { width: 600px; height: 600px; }
  .r2 { width: 720px; height: 720px; }
  .label {
    position: absolute; left: 0; right: 0; bottom: 110px; text-align: center;
    font-family: 'Segoe UI', 'Arial', sans-serif; font-size: 30px; font-weight: 700;
    letter-spacing: 8px; color: rgba(236, 240, 241, 0.55); text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="ring r2"></div>
  <div class="ring r1"></div>
  <div class="ball"></div>
  <div class="label">Collection Tracker</div>
</body>
</html>
