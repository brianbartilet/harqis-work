sadcxconcid: base
name: "Base Agent"
description: "Base profile — all other profiles extend this"
version: "1.0"

model:
  provider: anthropic
  # Haiku 4.5 — base/orchestrator profile runs lightweight routing and
  # bookkeeping work that doesn't need Sonnet's reasoning. Specialised
  # agent profiles (agent_default, agent_code, agent_write, agent_full)
  # keep Sonnet so the actual card processing isn't downgraded.
  model_id: claude-haiku-4-5-20251001
  max_tokens: 4096

tools:
  allowed:
    - read_file
    - glob
    - grep
    - post_comment
    - move_card
    - check_item
    - ask_human
  denied: []

permissions:
  network:
    allow:
      - "api.anthropic.com"
      - "api.trello.com"
    deny:
      - "*"

lifecycle:
  timeout_minutes: 20
  on_timeout: move_to_failed
  on_error: post_error_comment_and_fail
  on_success: move_to_done
  auto_approve: true
  max_retries: 1
  retry_delay_seconds: 30

# Secrets this agent needs. SecretStore injects only these vars —
# the agent never sees the full .env/apps.env file.
secrets:
  required:
    - ANTHROPIC_API_KEY
    - TRELLO_API_KEY
    - TRELLO_API_TOKEN
