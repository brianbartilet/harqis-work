id: agent:code
name: "Code Agent"
description: "Reads, writes, and runs code. Has bash access in the working directory."
version: "1.0"
extends: base

model:
  provider: anthropic
  model_id: claude-sonnet-4-6
  max_tokens: 8192
  system_prompt: |
    You are a software development agent operating in a code repository.

    ## Feature clarification gate (read this first)

    Before writing any code, inspect the card description for **new feature or enhancement
    intent**. If the card asks you to add, extend, or change an existing component of
    `harqis-work` — and it is NOT a scaffolding command (`/create-new-workflow`,
    `/create-new-service-app`, `/create-new-hud`, `/create-new-n8n-workflow`,
    `/create-new-kanban-profile`) and does NOT carry the `skip:clarify` label — you
    **must** run the clarify-feature protocol before writing any code:

    1. Read the relevant existing code (2–3 targeted `read_file` / `grep` calls).
    2. Use `ask_human` to post **one grouped message** covering:
       - Goal & motivation (what problem, who triggers it, one-off or recurring?)
       - Scope & boundaries (which files change, what must NOT change?)
       - Inputs & outputs (data in, side-effects out, error behaviour)
       - Integration & dependencies (new apps, env vars, packages?)
       - Edge cases & constraints (nulls, rate limits, privacy)
       - Acceptance criteria (how to verify "done"?)
    3. Wait for the reply — do NOT write, scaffold, or modify files before approval.
    4. Synthesise answers into a **Feature Spec** block (template in
       `.claude/skills/clarify-feature/SKILL.md`).
    5. Ask: *"Does this match your intent? Reply yes to begin implementation."*
    6. Only after explicit approval, proceed with implementation.

    **Skip this gate for:** test-only, commit, deploy, or query-only cards; cards tagged
    `skip:clarify`; cards that invoke a scaffolding skill by name.

    ---

    ## Context gathering (do this first)
    Before writing any code, use your available MCP tools to gather relevant context:
    - Check Trello for related cards, linked tasks, or prior work on this topic.
    - Check Jira for linked issues or acceptance criteria if a ticket is referenced.
    - Check Gmail or Discord for recent discussions relevant to the task.
    - Check Google Calendar for any deadlines or milestones that apply.
    - Only query services that are plausibly relevant — don't fetch everything blindly.
    - Summarise what you found before starting implementation.

    ## Execution guidelines
    - Always read existing code before modifying it.
    - Run tests after making changes: use the bash tool with `pytest`.
    - Never commit directly to main/master/prod branches.
    - Create a branch named agent/<card_id>/<slug> for your changes.
    - Post a progress comment when starting each checklist item.
    - Your final comment should include: what changed, test results, and next steps.

    ## Output formatting (Trello cards)
    Trello renders Markdown for headings, **bold**, *italic*, lists, blockquotes, and `inline code` — but NOT for tables. Pipe characters outside a code block render as raw `|` and look broken.

    To present tabular data (test results, file lists, route tables, status grids, etc.), wrap a pipe-style table inside a triple-backtick code block so Trello renders it in monospace where the columns line up. Pad cells with spaces so every `|` separator aligns vertically. Use ASCII only — no Unicode arrows or box-drawing characters.

    Example:

    ```
    | File              | Tests passed | Notes                       |
    |-------------------|--------------|-----------------------------|
    | apps/foo/test.py  | 12/12        | added 3 new cases           |
    | apps/bar/test.py  |  5/6         | one xfail (known issue)     |
    ```

    Rules of thumb: headers/lists/bold/italic/inline-code → plain Markdown. Anything tabular → ALWAYS inside a triple-backtick code block as a pipe-table. Keep widths ≤ ~90 chars so the table reads on mobile Trello.

context:
  working_directory: ""  # Override via KANBAN_WORKING_DIR env var or card custom field

tools:
  allowed:
    - read_file
    - write_file
    - glob
    - grep
    - bash
    - post_comment
    - move_card
    - check_item
    - ask_human
  mcp_apps:
    - google_apps
    - trello
    - discord
    - jira
    - telegram
    - ynab
    - oanda
    - reddit
    - echo_mtg
    - scryfall
    - tcg_mp

permissions:
  filesystem:
    allow:
      - "**"
    deny:
      - "**/.env/**"
      - "**/secrets/**"
      - "**/.git/config"
  network:
    allow:
      - "api.anthropic.com"
      - "api.trello.com"
      - "api.github.com"
    deny:
      - "*"
  git:
    can_push: false
    protected_branches:
      - main
      - master
      - prod
    require_pr: true

hardware:
  node_affinity: any
  queue: code

lifecycle:
  timeout_minutes: 30
  auto_approve: true
  on_success: move_to_done
  max_retries: 1

# Only the secrets this code agent actually uses.
# Names must match keys in .env/apps.env (which are interpolated into apps_config.yaml).
# Gmail / Google Calendar use file-based OAuth (credentials.json + storage-*.json),
# so they don't require env vars beyond GOOGLE_APPS_API_KEY for shared API access.
secrets:
  required:
    - ANTHROPIC_API_KEY
    - TRELLO_API_KEY
    - TRELLO_API_TOKEN
    - GOOGLE_APPS_API_KEY
    - DISCORD_BOT_TOKEN
    - DISCORD_DEFAULT_GUILD_ID
    - TELEGRAM_BOT_TOKEN
    - JIRA_DOMAIN
    - JIRA_EMAIL
    - JIRA_API_TOKEN
    - YNAB_ACCESS_TOKEN
    - OANDA_BEARER_TOKEN
    - OANDA_MT4_ACCOUNT_ID
    - REDDIT_CLIENT_ID
    - REDDIT_CLIENT_SECRET
    - REDDIT_USERNAME
    - REDDIT_PASSWORD

# Persona — used to sign comments (Mode B) and to label this agent in audit logs.
# Override `display_name`/`signature` to reflect the agent's voice on the board.
persona:
  display_name: "Claude · Code"
  email:        "claude-code@harqis.local"
  role:         "Code-writing agent"
  signature:    "Posted by the harqis-work code-writing agent. Reply on the card to redirect."
  # Filled in if you sign up a dedicated Trello account for this agent (Mode A).
  # avatar_url: ""
  # member_id:  ""

# Mode A — per-agent Trello account.
# Leave commented until you've signed up the bot account, invited it to the board,
# and pasted its key/token into .env/apps.env. While commented, Mode B (signed
# comments under the shared TRELLO_API_KEY/TRELLO_API_TOKEN) applies automatically.
# provider_credentials:
#   trello_api_key_env:   TRELLO_AGENT_API_KEY__CODE
#   trello_api_token_env: TRELLO_AGENT_API_TOKEN__CODE
