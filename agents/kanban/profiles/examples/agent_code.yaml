id: agent:code
name: "Code Agent"
description: "Reads, writes, and runs code. Has bash access in the working directory."
version: "1.0"
extends: base

model:
  provider: anthropic
  model_id: claude-sonnet-4-6
  max_tokens: 8192
  system_prompt: |
    You are a software development agent operating in a code repository.

    ## Context gathering (do this first)
    Before writing any code, use your available MCP tools to gather relevant context:
    - Check Trello for related cards, linked tasks, or prior work on this topic.
    - Check Jira for linked issues or acceptance criteria if a ticket is referenced.
    - Check Gmail or Discord for recent discussions relevant to the task.
    - Check Google Calendar for any deadlines or milestones that apply.
    - Only query services that are plausibly relevant — don't fetch everything blindly.
    - Summarise what you found before starting implementation.

    ## Execution guidelines
    - Always read existing code before modifying it.
    - Run tests after making changes: use the bash tool with `pytest`.
    - Never commit directly to main/master/prod branches.
    - Create a branch named agent/<card_id>/<slug> for your changes.
    - Post a progress comment when starting each checklist item.
    - Your final comment should include: what changed, test results, and next steps.

context:
  working_directory: ""  # Override via KANBAN_WORKING_DIR env var or card custom field

tools:
  allowed:
    - read_file
    - write_file
    - glob
    - grep
    - bash
    - post_comment
    - move_card
    - check_item
  mcp_apps:
    - google_apps
    - trello
    - discord
    - jira
    - telegram
    - ynab
    - oanda
    - reddit
    - echo_mtg
    - scryfall
    - tcg_mp

permissions:
  filesystem:
    allow:
      - "**"
    deny:
      - "**/.env/**"
      - "**/secrets/**"
      - "**/.git/config"
  network:
    allow:
      - "api.anthropic.com"
      - "api.trello.com"
      - "api.github.com"
    deny:
      - "*"
  git:
    can_push: false
    protected_branches:
      - main
      - master
      - prod
    require_pr: true

hardware:
  node_affinity: any
  queue: code

lifecycle:
  timeout_minutes: 30
  auto_approve: true
  on_success: move_to_done
  max_retries: 1

# Only the secrets this code agent actually uses.
# Names must match keys in .env/apps.env (which are interpolated into apps_config.yaml).
# Gmail / Google Calendar use file-based OAuth (credentials.json + storage-*.json),
# so they don't require env vars beyond GOOGLE_APPS_API_KEY for shared API access.
secrets:
  required:
    - ANTHROPIC_API_KEY
    - TRELLO_API_KEY
    - TRELLO_API_TOKEN
    - GOOGLE_APPS_API_KEY
    - DISCORD_BOT_TOKEN
    - DISCORD_DEFAULT_GUILD_ID
    - TELEGRAM_BOT_TOKEN
    - JIRA_DOMAIN
    - JIRA_EMAIL
    - JIRA_API_TOKEN
    - YNAB_ACCESS_TOKEN
    - OANDA_BEARER_TOKEN
    - OANDA_MT4_ACCOUNT_ID
    - REDDIT_CLIENT_ID
    - REDDIT_CLIENT_SECRET
    - REDDIT_USERNAME
    - REDDIT_PASSWORD
