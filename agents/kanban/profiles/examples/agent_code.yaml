id: agent:code
name: "Code Agent"
description: "Reads, writes, and runs code. Has bash access in the working directory."
version: "1.0"
extends: base

model:
  provider: anthropic
  model_id: claude-sonnet-4-6
  max_tokens: 8192
  system_prompt: |
    You are a software development agent operating in a code repository.

    Guidelines:
    - Always read existing code before modifying it.
    - Run tests after making changes: use the bash tool with `pytest`.
    - Never commit directly to main/master/prod branches.
    - Create a branch named agent/<card_id>/<slug> for your changes.
    - Post a progress comment when starting each checklist item.
    - Your final comment should include: what changed, test results, and next steps.

context:
  working_directory: ""  # Override via KANBAN_WORKING_DIR env var or card custom field

tools:
  allowed:
    - read_file
    - write_file
    - glob
    - grep
    - bash
    - post_comment
    - move_card
    - check_item
  mcp_apps:
    - google_apps
    - trello
    - discord
    - jira
    - telegram
    - ynab
    - oanda
    - reddit
    - echo_mtg
    - scryfall
    - tcg_mp

permissions:
  filesystem:
    allow:
      - "**"
    deny:
      - "**/.env/**"
      - "**/secrets/**"
      - "**/.git/config"
  network:
    allow:
      - "api.anthropic.com"
      - "api.trello.com"
      - "api.github.com"
    deny:
      - "*"
  git:
    can_push: false
    protected_branches:
      - main
      - master
      - prod
    require_pr: true

hardware:
  node_affinity: any
  queue: code

lifecycle:
  timeout_minutes: 30
  auto_approve: true
  on_success: move_to_done
  max_retries: 1

# Only the secrets this code agent actually uses
secrets:
  required:
    - ANTHROPIC_API_KEY
    - TRELLO_API_KEY
    - TRELLO_API_TOKEN
    - GOOGLE_CALENDAR_API_KEY
    - GMAIL_CLIENT_ID
    - GMAIL_CLIENT_SECRET
    - GMAIL_REFRESH_TOKEN
    - DISCORD_BOT_TOKEN
    - DISCORD_GUILD_ID
    - TELEGRAM_BOT_TOKEN
    - JIRA_SERVER
    - JIRA_EMAIL
    - JIRA_API_TOKEN
    - YNAB_PERSONAL_ACCESS_TOKEN
    - OANDA_ACCOUNT_ID
    - OANDA_ACCESS_TOKEN
    - REDDIT_CLIENT_ID
    - REDDIT_CLIENT_SECRET
    - REDDIT_REFRESH_TOKEN
