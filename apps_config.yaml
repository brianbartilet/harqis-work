ELASTIC_LOGGING:
  app_id: 'elasticsearch'
  client: 'rest'
  parameters:
    url: http://localhost:9200
  app_data:
    update_interval: "DAILY"
    api_key: ${ELASTIC_API_KEY}
    username: ${ELASTIC_USER}
    password: ${ELASTIC_PASSWORD}
    use_basic_auth: False
    auth_type: basic
    default_index: harqis-elastic-logging


DESKTOP:
  capture:
    strf_time: "%Y-%m-%d-%H-%M"
    re_monthly: '\b\d{4}-\d{2}\b'
    re_daily: '\b\d{4}-\d{2}-\d{2}\b'
    re_hourly: '\b\d{4}-\d{2}-\d{2} \d{2}\b'
    actions_log_path: ${ACTIONS_LOG_PATH}
    archive_path: ${ACTIONS_ARCHIVE_PATH}
    screenshots_path: ${ACTIONS_SCREENSHOT_PATH}
    show_console: False
  copy_files:
    path_dev_files: ${DESKTOP_PATH_DEV}
    path_run_files: ${DESKTOP_PATH_RUN}
  corsair:
    path_profiles: ${DESKTOP_PATH_I_CUE_PROFILES}
  feed:
    path_to_feed: ${DESKTOP_PATH_FEED}


ELEVEN_LABS:
  data:
    assistants:
      agent_n8n_automation: ${ELEVEN_AGENT_N8N}
      agent_n8n_automation_chat: ${ELEVEN_AGENT_N8N_CHAT}
      agent_n8n_automation_chat_tests: ${ELEVEN_AGENT_N8N_CHAT_TESTS}


