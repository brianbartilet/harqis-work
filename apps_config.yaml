CELERY_TASKS:
  application_name: 'workflow-harqis'
  broker: ${CELERY_BROKER}


N8N:
    base_url: 'http://localhost:5678'
    api_key: ${N8N_API_KEY}


# DEPRECATED: HARQIS_GPT is the legacy config key used by the Assistants v2 REST fixtures
# in apps/open_ai/references/services/. Kept to avoid breaking existing hud/ workflows.
# New integrations should use the OPEN_AI section below.
HARQIS_GPT:
  client: 'rest'
  parameters:
    base_url: 'https://api.openai.com/v1'
    response_encoding: 'utf-8'
    verify: True
    timeout: 60
    stream: True
  app_data:
    api_key: ${OPENAI_API_KEY}
    model: 'gpt-4.1'
    max_tokens: 200
    default_assistant_id: ${OPENAI_ASSISTANT_ID}
    assistant_id_desktop: ${OPENAI_ASSISTANT_DESKTOP}
    assistant_id_reporter: ${OPENAI_ASSISTANT_REPORTER}


