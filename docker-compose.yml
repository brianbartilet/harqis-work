services:

  # ── OwnTracks ─────────────────────────────────────────────────────────────

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./apps/own_tracks/mosquitto/config:/mosquitto/config
      - ./apps/own_tracks/mosquitto/data:/mosquitto/data
      - ./apps/own_tracks/mosquitto/log:/mosquitto/log

  recorder:
    image: owntracks/recorder:latest
    container_name: owntracks-recorder
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      OTR_HOST: mosquitto
      OTR_PORT: 1883
      OTR_USER: ""
      OTR_PASS: ""
      OTR_HTTP_PORT: 8083
    volumes:
      - ./apps/own_tracks/recorder_store:/store
    depends_on:
      - mosquitto

  # ── n8n + ngrok ───────────────────────────────────────────────────────────

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${HOST_PORT_N8N:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows.mapping:/data/workflows.mapping:ro
      - ./scripts.mapping:/data/scripts.mapping:ro
    environment:
      TZ: Asia/Singapore
      N8N_TIMEZONE: Asia/Singapore
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    env_file:
      - ./.env/apps.env
    command:
      - "http"
      - "n8n:5678"
      - "--log=stdout"
      - "--log-format=json"
    ports:
      - "4040:4040"
    depends_on:
      - n8n

volumes:
  n8n_data:
