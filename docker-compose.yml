services:

  # ── Message Broker ─────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics ping
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 30s
      timeout: 5s
      retries: 3

  # ── OwnTracks ───────────────────────────────────────────────────────────────

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./apps/own_tracks/mosquitto/config:/mosquitto/config
      - ./apps/own_tracks/mosquitto/data:/mosquitto/data
      - ./apps/own_tracks/mosquitto/log:/mosquitto/log

  recorder:
    image: owntracks/recorder:latest
    container_name: owntracks-recorder
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      OTR_HOST: mosquitto
      OTR_PORT: 1883
      OTR_USER: ""
      OTR_PASS: ""
      OTR_HTTP_PORT: 8083
    volumes:
      - ./apps/own_tracks/recorder_store:/store
    depends_on:
      - mosquitto

  # ── n8n ─────────────────────────────────────────────────────────────────────

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${HOST_PORT_N8N:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows.mapping:/data/workflows.mapping:ro
      - ./scripts.mapping:/data/scripts.mapping:ro
    environment:
      TZ: Asia/Singapore
      N8N_TIMEZONE: Asia/Singapore
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Observability ───────────────────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    restart: unless-stopped
    ports:
      - "127.0.0.1:9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: >
        curl -s http://localhost:9200/_cluster/health |
        grep -q '"status":"green"\|"status":"yellow"'
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    restart: unless-stopped
    ports:
      - "127.0.0.1:5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ── Public Tunnels ──────────────────────────────────────────────────────────
  # Use one or both. cloudflared gives a stable custom domain (free).
  # ngrok is useful for quick testing or when Cloudflare isn't configured yet.

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - n8n

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    command:
      - "http"
      - "n8n:5678"
      - "--log=stdout"
      - "--log-format=json"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    env_file:
      - ./.env/apps.env
    ports:
      - "4040:4040"
    depends_on:
      - n8n

volumes:
  rabbitmq_data:
  redis_data:
  n8n_data:
  elastic_data:
