# Per-machine deployment topology for scripts/deploy.py.
#
# How auto-detection works:
#   1. python scripts/deploy.py reads socket.gethostname()
#   2. looks the hostname up in [hostnames] below to get a machine name
#   3. loads the corresponding [<name>] section
#   4. falls back to [default] if nothing matches
#
# Override on the command line:
#   python scripts/deploy.py --machine harqis-server
#   python scripts/deploy.py --role node --queues agent,worker
#
# Per-machine fields:
#   role            "host" (runs scheduler + docker) or "node" (worker-only)
#   queues          list of Celery queues this machine consumes
#   disable         list of services NOT to run here (subset of:
#                   scheduler worker frontend mcp kanban flower)
#   kanban_profile  agent profile filter for the kanban orchestrator
#                   (e.g. "agent:default", "agent:code")
#   kanban_num_agents  concurrent in-process kanban agents (default: 1)


# Fallback when no [hostnames] entry matches.
[default]
role = "host"
queues = ["default", "default_broadcast"]


# ── Always-on hub: TCG/PEON/AGENT workloads, full host stack ─────────────────
[harqis-server]
role = "host"
queues = ["default", "tcg", "host", "adhoc", "default_broadcast", "n8n"]
kanban_num_agents = 4

# ── Windows work box: DEFAULT + HUD, no Kanban here ──────────────────────────
[windows-work]
role = "host"
queues = ["default", "hud", "default_broadcast"]
disable = ["kanban", "scheduler"]

[windows-work-all]
role = "host"
queues = ["host", "default", "hud", "peon", "adhoc", "default_broadcast", "agent"]
disable = ["kanban", "scheduler"]
# Beat must run on exactly one machine cluster-wide (harqis-server is the
# canonical Beat runner per the "always-on hub" comment), so disable scheduler
# here. Kanban runs as an agent worker — orchestrator + agent are the same
# process today; OS auto-detection keeps it claiming only os:windows cards
# (or unlabelled cards via cooperative-claim race with other orchestrators).
# Concurrent in-process agent workers per board. Bump for more throughput.
kanban_num_agents = 4
# Optionally narrow this orchestrator to a single profile slice. Uncomment to
# pin this box to one agent type (other profiles will be claimed by other
# orchestrators in the workspace). Leave commented to run any profile that
# matches the host's os:* labels.
# kanban_profile = "agent:code"


# ── VPS worker nodes — pure workers, no docker / scheduler ───────────────────
[vps-worker]
role = "node"
queues = ["agent", "worker", "default_broadcast"]
kanban_profile = "agent:code"


# Map socket.gethostname() → machine name above.
#
# Real hostname mappings should NOT live here — they leak topology. Put them
# in machines.local.toml (gitignored, sits next to this file at the repo
# root). deploy.py merges that file on top of this one at load time.
#
# Find this machine's hostname:  python -c "import socket; print(socket.gethostname())"
[hostnames]
# "<bare-hostname>"        = "harqis-server"
# "<bare-hostname>.local"  = "harqis-server"
# "<windows-hostname>"     = "windows-work"
# "<vps-hostname>"         = "vps-worker"


# ── Daily dumps workflow (workflows/dumps/) ───────────────────────────────────
# Schema only — actual values belong in machines.local.toml.
#
# [dumps] holds the harqis-server SSH target and inbox path that the broadcast
# task ships files to:
#
#     [dumps]
#     harqis_server_ssh   = "<remote-user>@<host-or-tailscale-magicdns>"
#     harqis_server_inbox = "<absolute-path-on-harqis-server>"
#
# Per-machine paths to scan are declared on the matching [<machine>] block:
#
#     [<machine>.daily_dumps]
#     paths = [ "<absolute-path>", "<absolute-path>" ]
#
# Non-celery devices (Android via Termux SSHD, etc.) are pulled by the
# host-side task — list them here:
#
#     [dumps.pull_targets.<device-name>]
#     ssh   = "<remote-user>@<host-or-tailscale-magicdns>"
#     port  = 22                  # 8022 for Termux's default
#     paths = [ "<absolute-path>", ... ]
#
# Full reference: workflows/dumps/README.md
