# Per-machine deployment topology for scripts/deploy.py.
#
# How auto-detection works:
#   1. python scripts/deploy.py reads socket.gethostname()
#   2. looks the hostname up in [hostnames] below to get a machine name
#   3. loads the corresponding [<name>] section
#   4. falls back to [default] if nothing matches
#
# Override on the command line:
#   python scripts/deploy.py --machine harqis-server
#   python scripts/deploy.py --role node --queues agent,worker
#
# Per-machine fields:
#   role            "host" (runs scheduler + docker) or "node" (worker-only)
#   queues          list of Celery queues this machine consumes
#   disable         list of services NOT to run here (subset of:
#                   scheduler worker frontend mcp kanban flower)
#   kanban_profile  agent profile filter for the kanban orchestrator
#                   (e.g. "agent:default", "agent:code")
#   kanban_num_agents  concurrent in-process kanban agents (default: 1)
#   [<name>.emulator]  optional table — auto-launch an Android emulator on
#                   deploy (see the [windows-work-all.emulator] example below)
#   [token_expiry_watchdog] / [<name>.token_expiry_watchdog]
#                   optional tables for scripts/agents/diagnostics/check_access_tokens.py
#                   (quiet token-expiry watchdog; real overrides belong in machines.local.toml)


# Fallback when no [hostnames] entry matches.
[default]
role = "host"
queues = ["default", "default_broadcast"]


# ── Always-on hub: TCG/PEON/AGENT workloads, full host stack ─────────────────
[harqis-server]
role = "host"
queues = ["default", "tcg", "host", "adhoc", "hfl", "default_broadcast", "hfl_broadcast", "n8n"]
kanban_num_agents = 4

# ── Windows work box: DEFAULT + HUD, no Kanban here ──────────────────────────
[windows-work]
role = "host"
queues = ["default", "hud", "default_broadcast", "hfl_broadcast"]
disable = ["kanban", "scheduler"]

[windows-work-all]
role = "host"
# NOTE: the `host` queue is intentionally absent. It carries tasks pinned to the
# always-on hub (harqis-server) — dumps analyze/pull touch the macOS inbox
# `/Volumes/harqis-data/dumps`, and the hud data-only twins are host-only (see
# workflows/config.py task_routes). If this box also consumes `host`, a
# competing-consumers race lets it grab those tasks and run them against paths
# that only exist on the Mac mini (e.g. "inbox not yet created"). Keep `host`
# on harqis-server alone.
queues = ["default", "hud", "peon", "adhoc", "default_broadcast", "hfl_broadcast", "agent"]
disable = ["kanban", "scheduler"]
# Beat must run on exactly one machine cluster-wide (harqis-server is the
# canonical Beat runner per the "always-on hub" comment), so disable scheduler
# here. Kanban runs as an agent worker — orchestrator + agent are the same
# process today; OS auto-detection keeps it claiming only os:windows cards
# (or unlabelled cards via cooperative-claim race with other orchestrators).
# Concurrent in-process agent workers per board. Bump for more throughput.
kanban_num_agents = 4
# Optionally narrow this orchestrator to a single profile slice. Uncomment to
# pin this box to one agent type (other profiles will be claimed by other
# orchestrators in the workspace). Leave commented to run any profile that
# matches the host's os:* labels.
# kanban_profile = "agent:code"

# Auto-launch an Android emulator on this box when deploy.py runs. Driven by the
# [<machine>.emulator] table below — only machines that declare it get one (the
# emulator self-skips on any host without the Android SDK). The profile(s) come
# from apps_config.yaml ANDROID_EMULATOR.profiles; persistence, Play Store, the
# UI window, keyboard, nav, RAM/cores/GPU all live there. Composes with the
# deploy flags: `--down` stops it, `--restart emulator` cycles it, `--status`
# lists it, `--stop emulator` stops it without touching other services.
[windows-work-all.emulator]
enabled = false
profiles = ["pixel7-test"]   # one or more profile names; `profile = "x"` also accepted
wait_for_boot = false        # deploy returns immediately; the emulator boots in the background
boot_timeout = 300

# Connect + mirror a PHYSICAL phone on deploy ([<machine>.device]). On deploy it
# tries USB first, falls back to a wireless target, and if neither is reachable
# prints a message and skips gracefully. When connected it mirrors via scrcpy and
# leaves a watchdog daemon running that auto-reconnects + re-mirrors whenever the
# device drops (e.g. you leave/return to Wi-Fi range) — no need to re-run deploy.
# Composes with the flags: `--restart device` / `--stop device` / `--down` /
# `--status`. NOTE: this is SCHEMA ONLY (public repo) — put the real `serial` /
# `wireless` values in machines.local.toml (gitignored), e.g.
#     [windows-work-all.device]
#     enabled  = true
#     serial   = "<usb-serial>"        # from `run_emulator.py devices`
#     wireless = "<phone-ip>:5555"     # wireless fallback target
[windows-work-all.device]
enabled = false
serial = ""                  # preferred USB serial (blank = any attached USB device)
wireless = ""                # wireless fallback host:port (e.g. 192.168.1.x:5555)
mirror = true                # launch a scrcpy mirror window after connecting
reconnect = true             # keep a watchdog that auto-reconnects on drop
interval = 10                # seconds between connection checks
title = "QA device"          # mirror window title
max_size = 1280              # cap the longer screen dimension (px) for smoother Wi-Fi


# ── VPS worker nodes — pure workers, no docker / scheduler ───────────────────
[vps-worker]
role = "node"
queues = ["agent", "worker", "default_broadcast"]
kanban_profile = "agent:code"


# Map socket.gethostname() → machine name above.
#
# Real hostname mappings should NOT live here — they leak topology. Put them
# in machines.local.toml (gitignored, sits next to this file at the repo
# root). deploy.py merges that file on top of this one at load time.
#
# Find this machine's hostname:  python -c "import socket; print(socket.gethostname())"
[hostnames]
# "<bare-hostname>"        = "harqis-server"
# "<bare-hostname>.local"  = "harqis-server"
# "<windows-hostname>"     = "windows-work"
# "<vps-hostname>"         = "vps-worker"


# ── Token expiry watchdog (scripts/agents/diagnostics/check_access_tokens.py) ─
# Schema only — host-specific overrides belong in machines.local.toml.
# Quiet success is intentional for Hermes no-agent cron: empty stdout means no
# Telegram notification; expired/revoked/near-expiry findings print an alert.
#
# [token_expiry_watchdog]
# enabled = true
# warn_within_days = 2
# notify_missing = false          # true = alert on missing OAuth storage files too
# include_checks = ["google_oauth", "spotify_refresh", "plaud_jwt", "jwt_env"]
# google_configs = ["GOOGLE_APPS", "GOOGLE_GMAIL", "GOOGLE_GMAIL_SEND", "GOOGLE_KEEP", "GOOGLE_TASKS", "GOOGLE_DRIVE"]
#
# Per-machine override example:
# [harqis-server.token_expiry_watchdog]
# exclude_checks = ["jwt_env"]
#

# ── Daily dumps workflow (workflows/dumps/) ───────────────────────────────────
# Schema only — actual values belong in machines.local.toml.
#
# [dumps] holds the harqis-server SSH target and inbox path that the broadcast
# task ships files to:
#
#     [dumps]
#     harqis_server_ssh   = "<remote-user>@<host-or-tailscale-magicdns>"
#     harqis_server_inbox = "<absolute-path-on-harqis-server>"
#
# Per-machine paths to scan are declared on the matching [<machine>] block:
#
#     [<machine>.daily_dumps]
#     paths = [ "<absolute-path>", "<absolute-path>" ]
#
# Non-celery devices (Android via Termux SSHD, etc.) are pulled by the
# host-side task — list them here:
#
#     [dumps.pull_targets.<device-name>]
#     ssh   = "<remote-user>@<host-or-tailscale-magicdns>"
#     port  = 22                  # 8022 for Termux's default
#     paths = [ "<absolute-path>", ... ]
#
# Full reference: workflows/dumps/README.md


# ── Repository-backed notes (workflows/notes/) ───────────────────────────────
# Schema only — actual repositories and paths belong in machines.local.toml.
# The editing worker commits/pushes at 22:30; harqis-server clones or performs
# a clean fast-forward-only pull at 22:40; HFL ingests changes at 22:50.
# No force push, automatic rebase, or conflict resolution is performed.
# These repositories must not also appear in [<machine>.git_autopush].paths;
# that independent 02:00 list is reserved for generic Git-only backups.
#
#     [notes]
#     state_dir = "<host-state-directory-outside-the-checkout>"
#
#     [notes.repositories.<name>]
#     remote = "git@github.com:<owner>/<repo>.git"
#     branch = "main"
#     host_path = "<absolute-host-clone-path>"
#     tags = ["notes"]             # dsm is assigned per actual standup segment
#     include_globs = []
#     exclude_globs = [".git/**", ".idea/**", "**/.DS_Store"]
#     max_entries = 25
#     max_media = 10
#     max_text_chars = 20000
#     max_topics_per_note = 4
#
#     [<editing-machine>.notes.repositories]
#     <name> = "<absolute-local-checkout-path>"
#
# Full reference: workflows/notes/README.md


# ── Git auto-push (workflows/desktop/tasks/commands.py :: git_auto_push_paths) ─
# Schema only — real paths belong in machines.local.toml.
#
# A daily 02:00 broadcast task fans out to every worker on the
# default_broadcast queue. Each worker iterates its own list of local repo
# paths, runs add+commit+push, and rebases on non-fast-forward. Non-git or
# missing paths are silent skips; rebase conflicts auto-abort so the tree
# stays clean for the next run. Auth is delegated to the local git config
# (SSH key / credential helper) — terminal prompts are disabled so missing
# creds fail fast instead of hanging the daemon.
#
# This is a generic Git-only backup list. Keep note collections that use
# workflows/notes out of it; those use [<machine>.notes.repositories] and a
# separate guarded push → host pull → Activity Corpus ingest lifecycle.
#
#     [<machine>.git_autopush]
#     paths = [ "<absolute-path-to-git-repo>", "<absolute-path-to-git-repo>" ]
